<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production d'écrits — P5</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Caveat:wght@400;600;700&display=swap');

/* ── Variables ── */
:root {
  --bg:        #1C1C2E;
  --surface:   #252540;
  --card:      #2E2E4E;
  --border:    #3A3A5C;
  --text:      #E8E8F0;
  --muted:     #8888AA;
  --green:     #4CAF82;
  --green-l:   #1A3D2E;
  --blue:      #5B9CF6;
  --blue-l:    #1A2A4A;
  --purple:    #A97FF5;
  --purple-l:  #2A1A4A;
  --orange:    #F5A623;
  --orange-l:  #3A2A0A;
  --red:       #F56B6B;
  --red-l:     #3A1A1A;
  --white:     #FFFFFF;
  --chalk:     #F0EEE8;
  --radius:    12px;
  --radius-lg: 20px;
  --shadow:    0 4px 24px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
}

/* ── Screens ── */
.screen { display: none; position: fixed; inset: 0; }
.screen.active { display: flex; }

/* ══════════════════════════════════════
   ÉCRAN CALENDRIER
══════════════════════════════════════ */
#screen-cal {
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 32px 40px;
  overflow-y: auto;
  background: radial-gradient(ellipse at 20% 20%, #1e1e3a 0%, #0f0f1e 100%);
}

.cal-header {
  width: 100%;
  max-width: 900px;
  display: flex;
  align-items: center;
  gap: 20px;
  margin-bottom: 36px;
}

.cal-logo {
  width: 52px; height: 52px;
  background: var(--orange);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  box-shadow: 0 4px 16px rgba(245,166,35,0.4);
  flex-shrink: 0;
}

.cal-title h1 {
  font-size: 26px; font-weight: 900;
  color: var(--white);
  letter-spacing: -0.5px;
}
.cal-title p {
  font-size: 13px; color: var(--muted);
  margin-top: 2px;
}

.cal-grid {
  width: 100%;
  max-width: 900px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 16px;
}

.cal-day {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px 18px;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}
.cal-day::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: var(--day-color, var(--orange));
  border-radius: 4px 4px 0 0;
}
.cal-day:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow);
  border-color: var(--day-color, var(--orange));
}
.cal-day.locked {
  opacity: 0.4; cursor: default;
}
.cal-day.locked:hover { transform: none; box-shadow: none; }

.day-num {
  font-family: 'Caveat', cursive;
  font-size: 42px; font-weight: 700;
  color: var(--day-color, var(--orange));
  line-height: 1;
  margin-bottom: 2px;
}
.day-month {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 12px;
}
.day-seance {
  font-size: 13px; font-weight: 800;
  color: var(--white);
  margin-bottom: 4px;
  line-height: 1.3;
}
.day-notion {
  font-size: 11px;
  color: var(--muted);
  line-height: 1.4;
}
.day-slides-count {
  position: absolute;
  top: 12px; right: 12px;
  background: var(--day-color, var(--orange));
  color: #fff;
  font-size: 10px; font-weight: 800;
  padding: 2px 7px;
  border-radius: 20px;
}
.day-lock {
  position: absolute;
  top: 12px; right: 12px;
  font-size: 16px; opacity: 0.5;
}

/* ══════════════════════════════════════
   ÉCRAN SLIDE
══════════════════════════════════════ */
#screen-slide {
  flex-direction: column;
  background: var(--bg);
}

.slide-topbar {
  display: flex;
  align-items: center;
  padding: 14px 24px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  gap: 16px;
  flex-shrink: 0;
  z-index: 10;
}

.btn-back {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 14px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 700;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.15s;
}
.btn-back:hover { background: var(--border); }

.slide-meta {
  flex: 1;
}
.slide-meta-title {
  font-size: 14px; font-weight: 800;
  color: var(--white);
}
.slide-meta-sub {
  font-size: 11px; color: var(--muted); margin-top: 1px;
}

.slide-progress {
  display: flex; align-items: center; gap: 8px;
}
.progress-dots {
  display: flex; gap: 5px;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--border);
  transition: all 0.2s;
  cursor: pointer;
}
.dot.active { background: var(--accent-color, var(--orange)); transform: scale(1.3); }
.dot.done { background: var(--accent-color, var(--orange)); opacity: 0.5; }

.slide-nav {
  display: flex; gap: 8px;
}
.btn-nav {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  width: 36px; height: 36px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.btn-nav:hover:not(:disabled) { background: var(--accent-color, var(--orange)); color: #fff; border-color: transparent; }
.btn-nav:disabled { opacity: 0.3; cursor: default; }

/* Zone slide principale */
.slide-stage {
  flex: 1;
  overflow: hidden;
  position: relative;
  min-height: 0;
}

.slide {
  display: none;
  position: absolute;
  inset: 0;
  padding: 18px 40px 12px;
  overflow: hidden;
  display: none;
  flex-direction: column;
  gap: 0;
  animation: slideIn 0.3s ease;
}
.slide.active {
  display: flex;
  flex-direction: column;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateX(20px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ── Composants slides ── */
.slide-phase {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--phase-bg, var(--orange-l));
  border: 1px solid var(--phase-color, var(--orange));
  color: var(--phase-color, var(--orange));
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px; font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
  flex-shrink: 0;
}

.slide-h1 {
  font-size: clamp(22px, 2.8vw, 36px);
  font-weight: 900;
  color: var(--white);
  letter-spacing: -1px;
  line-height: 1.1;
  margin-bottom: 2px;
  flex-shrink: 0;
}
.slide-h1 span { color: var(--accent-color, var(--orange)); }

.slide-sub {
  font-size: 12px; color: var(--muted);
  margin-bottom: 6px;
  font-style: italic;
  flex-shrink: 0;
}

.consigne-box {
  background: var(--card);
  border-left: 4px solid var(--accent-color, var(--orange));
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 10px 16px;
  font-size: 17px; font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  line-height: 1.4;
  flex-shrink: 0;
}

.rule-box {
  background: linear-gradient(135deg, var(--green-l), #1a2a1a);
  border: 2px solid var(--green);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-bottom: 8px;
  flex-shrink: 0;
}
.rule-box .rule-title {
  font-size: 11px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 1px; color: var(--green);
  margin-bottom: 8px;
}
.rule-box p {
  font-size: 16px; color: var(--text);
  line-height: 1.4;
}

/* Grille 2 colonnes */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 8px;
  flex-shrink: 0;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
}
.card-title {
  font-size: 11px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 10px;
}

/* Phrases à évaluer */
.phrase-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 14px;
  margin-bottom: 6px;
  transition: all 0.2s;
  flex-shrink: 0;
}
.phrase-text {
  flex: 1;
  font-family: 'Caveat', cursive;
  font-size: 52px;
  color: var(--text);
}
.phrase-badge {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 900;
  flex-shrink: 0;
  cursor: pointer;
  border: 2px solid var(--border);
  color: var(--muted);
  background: transparent;
  font-family: 'Nunito', sans-serif;
  transition: all 0.2s;
}
.phrase-badge:hover { transform: scale(1.1); }
.phrase-badge.ok { background: var(--green); border-color: var(--green); color: white; }
.phrase-badge.ko { background: var(--red); border-color: var(--red); color: white; }
.phrase-reason {
  font-size: 12px; color: var(--muted);
  display: none;
  margin-top: 2px;
  margin-bottom: 4px;
  padding: 5px 10px;
  background: var(--surface);
  border-radius: 8px;
  font-style: italic;
  flex-shrink: 0;
}
.phrase-reason.visible { display: block; }

/* Bloc texte grand */
.big-text-block {
  background: #0d0d1a;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 20px;
  font-family: 'Caveat', cursive;
  font-size: 52px;
  color: var(--chalk);
  line-height: 1.6;
  margin-bottom: 20px;
  text-align: center;
}

/* Versions comparées */
.versions-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 8px;
  flex-shrink: 0;
}
.version-card {
  border-radius: var(--radius);
  padding: 10px 14px;
  border: 2px solid transparent;
}
.version-card.v-ok {
  background: var(--green-l);
  border-color: var(--green);
}
.version-card.v-ko {
  background: var(--red-l);
  border-color: var(--red);
}
.version-label {
  font-size: 11px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 8px;
}
.v-ok .version-label { color: var(--green); }
.v-ko .version-label { color: var(--red); }
.version-text {
  font-family: 'Caveat', cursive;
  font-size: 46px;
  color: var(--text);
  line-height: 1.5;
}
.version-verdict {
  font-size: 24px;
  font-style: italic;
  margin-top: 8px;
  opacity: 0; transition: opacity 0.4s;
}
.version-verdict.visible { opacity: 1; }
.v-ok .version-verdict { color: var(--green); }
.v-ko .version-verdict { color: var(--red); }

/* Btn reveal */
.btn-reveal {
  background: var(--card);
  border: 2px solid var(--accent-color, var(--orange));
  color: var(--accent-color, var(--orange));
  padding: 10px 22px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-size: 14px; font-weight: 800;
  transition: all 0.2s;
  display: inline-flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.btn-reveal:hover {
  background: var(--accent-color, var(--orange));
  color: white;
}

/* ── DRAG AND DROP (S3) ── */
.dnd-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 8px;
  flex: 1;
  min-height: 0;
}

.dnd-source {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px;
  min-height: 40px;
  overflow-y: auto;
}
.dnd-source-title {
  font-size: 12px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--muted);
  margin-bottom: 12px;
}

.dnd-target {
  background: var(--card);
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 10px;
  min-height: 60px;
  transition: all 0.2s;
  overflow-y: auto;
}
.dnd-target.drag-over {
  border-color: var(--accent-color, var(--orange));
  background: var(--orange-l);
}
.dnd-target-title {
  font-size: 11px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 10px;
}

.dnd-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-family: 'Caveat', cursive;
  font-size: 42px;
  color: var(--text);
  cursor: grab;
  margin-bottom: 5px;
  transition: all 0.15s;
  user-select: none;
  display: flex; align-items: center; gap: 8px;
}
.dnd-item:hover { transform: translateX(3px); border-color: var(--accent-color, var(--orange)); }
.dnd-item.dragging { opacity: 0.4; }
.dnd-item::before { content: '⠿'; color: var(--muted); font-size: 14px; }

.dnd-correct { border-color: var(--green) !important; background: var(--green-l) !important; }
.dnd-wrong   { border-color: var(--red) !important;   background: var(--red-l) !important; }

/* Étapes connecteurs */
.steps-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 8px;
  flex-shrink: 0;
}
.step-item {
  display: flex;
  align-items: center;
  gap: 12px;
}
.step-num {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--accent-color, var(--orange));
  color: white;
  font-size: 14px; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.step-conn {
  background: var(--orange-l);
  border: 2px solid var(--orange);
  border-radius: 8px;
  padding: 8px 18px;
  font-size: 22px; font-weight: 800;
  color: var(--orange);
  min-width: 100px;
  text-align: center;
}
.step-arrow { color: var(--muted); font-size: 18px; }
.step-phrase {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 14px;
  font-family: 'Caveat', cursive;
  font-size: 46px;
  color: var(--text);
}

/* Substituts */
.subs-grid {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 10px;
  align-items: start;
  margin-bottom: 20px;
}

/* Grille critères */
.criteria-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 8px;
  font-size: 16px;
  flex-shrink: 0;
}
.criteria-table th {
  background: var(--card);
  color: var(--muted);
  font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.8px;
  padding: 7px 12px;
  text-align: left;
  font-weight: 800;
}
.criteria-table td {
  padding: 7px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--text);
}
.criteria-table tr:last-child td { border-bottom: none; }
.crit-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%;
  font-size: 13px; font-weight: 900;
}
.crit-ok { background: var(--green); color: white; }
.crit-ko { background: var(--red);   color: white; }
.crit-pending {
  background: var(--card);
  border: 2px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.crit-pending:hover { border-color: var(--orange); color: var(--orange); }

/* Questions planification */
.plan-questions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 8px;
  flex: 1;
  min-height: 0;
}
.plan-q {
  background: var(--card);
  border: 1px solid var(--border);
  border-left: 4px solid var(--purple);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 8px 14px;
  flex-shrink: 0;
}
.plan-q-num {
  font-size: 11px; font-weight: 800;
  color: var(--purple);
  text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 2px;
}
.plan-q-text {
  font-size: 22px; font-weight: 800; color: var(--white);
  margin-bottom: 6px;
}
.plan-q-ex {
  font-size: 14px; color: var(--muted);
  font-style: italic;
}

/* Minuteur */
.timer-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--orange-l);
  border: 1px solid var(--orange);
  color: var(--orange);
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px; font-weight: 800;
  margin-bottom: 6px;
  flex-shrink: 0;
}

/* Trace écrite */
.trace-box {
  background: linear-gradient(135deg, #1a1a2e, #1a2a3e);
  border: 2px solid var(--blue);
  border-radius: var(--radius);
  padding: 10px 16px;
  margin-top: 6px;
  flex-shrink: 0;
}
.trace-title {
  font-size: 11px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 0.8px;
  color: var(--blue);
  margin-bottom: 8px;
}
.trace-text {
  font-family: 'Caveat', cursive;
  font-size: 42px;
  color: var(--chalk);
  line-height: 1.6;
}

/* Tooltip correction */
.correction-reveal {
  margin-top: 6px;
  padding: 8px 14px;
  background: var(--green-l);
  border: 1px solid var(--green);
  border-radius: var(--radius);
  font-size: 14px;
  color: var(--green);
  display: none;
}
.correction-reveal.visible { display: block; animation: fadeIn 0.3s; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

/* Niveaux tags */
.niveau-tags {
  display: flex; gap: 8px; margin-bottom: 8px; flex-shrink: 0;
}
.niveau-tag {
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px; font-weight: 800;
}
.niveau-ce2 { background: var(--green-l); color: var(--green); border: 1px solid var(--green); }
.niveau-cm1 { background: var(--blue-l);  color: var(--blue);  border: 1px solid var(--blue); }
.niveau-cm2 { background: var(--purple-l);color: var(--purple);border: 1px solid var(--purple); }

/* ── Responsive ── */
@media (max-width: 768px) {
  .dnd-container, .versions-grid, .two-col { grid-template-columns: 1fr; }
  .slide { padding: 20px 24px; }
  .slide-h1 { font-size: 22px; }
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════
     ÉCRAN CALENDRIER
══════════════════════════════════════ -->
<div id="screen-cal" class="screen active">
  <div class="cal-header">
    <div class="cal-logo">✏️</div>
    <div class="cal-title">
      <h1>Production d'écrits — Période 5</h1>
      <p>CE2 · CM1 · CM2 — Jeudis matin — Cliquer sur une séance pour la lancer</p>
    </div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>

<!-- ══════════════════════════════════════
     ÉCRAN SLIDE
══════════════════════════════════════ -->
<div id="screen-slide" class="screen">
  <div class="slide-topbar">
    <button class="btn-back" onclick="goBack()">← Calendrier</button>
    <div class="slide-meta">
      <div class="slide-meta-title" id="slide-title-bar">—</div>
      <div class="slide-meta-sub" id="slide-sub-bar">—</div>
    </div>
    <div class="slide-progress">
      <div class="progress-dots" id="progress-dots"></div>
    </div>
    <div class="slide-nav">
      <button class="btn-nav" id="btn-prev" onclick="prevSlide()">‹</button>
      <button class="btn-nav" id="btn-next" onclick="nextSlide()">›</button>
    </div>
  </div>
  <div class="slide-stage" id="slide-stage"></div>
</div>

<script>
// ══════════════════════════════════════
// DATA — Définition des séances
// ══════════════════════════════════════
const SEANCES = [
  {
    id: 's1',
    date: '24',
    month: 'Avril',

// ══════════════════════════════════════
// ÉTAT
// ══════════════════════════════════════
let currentSeance = null;
let currentSlide = 0;

// ══════════════════════════════════════
// CALENDRIER
// ══════════════════════════════════════
function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  SEANCES.forEach(s => {
    const div = document.createElement('div');
    div.className = 'cal-day' + (s.locked ? ' locked' : '');
    div.style.setProperty('--day-color', s.color);
    div.innerHTML = `
      <div class="day-num">${s.date}</div>
      <div class="day-month">${s.month} 2026</div>
      <div class="day-seance">${s.seance}</div>
      <div class="day-notion">${s.notion}</div>
      ${s.locked
        ? '<div class="day-lock">🔒</div>'
        : `<div class="day-slides-count">${s.slides.length} slides</div>`}
    `;
    if (!s.locked) div.addEventListener('click', () => openSeance(s.id));
    grid.appendChild(div);
  });
}

// ══════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════
function openSeance(id) {
  currentSeance = SEANCES.find(s => s.id === id);
  currentSlide = 0;
  document.getElementById('screen-cal').classList.remove('active');
  document.getElementById('screen-slide').classList.add('active');
  document.documentElement.style.setProperty('--accent-color', currentSeance.color);
  renderSlides();
  updateNav();
}

function goBack() {
  document.getElementById('screen-slide').classList.remove('active');
  document.getElementById('screen-cal').classList.add('active');
  currentSeance = null;
}

function nextSlide() {
  if (currentSlide < currentSeance.slides.length - 1) {
    currentSlide++;
    renderSlides();
    updateNav();
  }
}

function prevSlide() {
  if (currentSlide > 0) {
    currentSlide--;
    renderSlides();
    updateNav();
  }
}

function goToSlide(i) {
  currentSlide = i;
  renderSlides();
  updateNav();
}

function renderSlides() {
  const stage = document.getElementById('slide-stage');
  stage.innerHTML = '';
  const s = currentSeance.slides[currentSlide];
  const div = document.createElement('div');
  div.className = 'slide active';
  div.innerHTML = s.html;
  stage.appendChild(div);

  document.getElementById('slide-title-bar').textContent = currentSeance.seance;
  document.getElementById('slide-sub-bar').textContent =
    `Slide ${currentSlide + 1} / ${currentSeance.slides.length}`;

  // Dots
  const dots = document.getElementById('progress-dots');
  dots.innerHTML = '';
  currentSeance.slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === currentSlide ? ' active' : i < currentSlide ? ' done' : '');
    d.onclick = () => goToSlide(i);
    dots.appendChild(d);
  });

  // Réinitialiser DnD si présent
  if (stage.querySelector('#dnd-pool')) initDnd();
}

function updateNav() {
  document.getElementById('btn-prev').disabled = currentSlide === 0;
  document.getElementById('btn-next').disabled = currentSlide === currentSeance.slides.length - 1;
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (!currentSeance) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextSlide();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prevSlide();
  if (e.key === 'Escape') goBack();
});

// ══════════════════════════════════════
// INTERACTIONS SLIDES
// ══════════════════════════════════════
function toggleBadge(btn, result, reasonId) {
  const reason = document.getElementById(reasonId);
  if (reason) reason.classList.toggle('visible');
  if (btn.dataset.result === 'ok') {
    btn.classList.toggle('ok');
    btn.textContent = btn.classList.contains('ok') ? '✓' : '?';
    // Colorer aussi le parent phrase-item si ok
    const item = btn.closest('.phrase-item');
    if (item) {
      if (btn.classList.contains('ok')) {
        item.style.borderColor = 'var(--green)';
        item.style.background = 'var(--green-l)';
      } else {
        item.style.borderColor = '';
        item.style.background = '';
      }
    }
  } else if (btn.dataset.result === 'ko') {
    btn.classList.toggle('ko');
    btn.textContent = btn.classList.contains('ko') ? '✗' : '?';
    const item = btn.closest('.phrase-item');
    if (item) {
      if (btn.classList.contains('ko')) {
        item.style.borderColor = 'var(--red)';
        item.style.background = 'var(--red-l)';
      } else {
        item.style.borderColor = '';
        item.style.background = '';
      }
    }
  }
}

function revealReason(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('visible');
}

function revealVersions() {
  ['v1-verdict','v2-verdict'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('visible');
  });
}

function revealIntroVerdicts() {
  ['ia-v','ib-v'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('visible');
  });
}

function showParagraphes() {
  const el = document.getElementById('para-result');
  if (el) { el.style.display = 'block'; el.style.animation = 'fadeIn 0.4s'; }
}

function showSubstituts() {
  const el = document.getElementById('sub-result');
  if (el) { el.style.display = 'block'; }
}

function showIntroConclusion() {
  const el = document.getElementById('intro-result');
  if (el) { el.style.display = 'block'; }
}

function showTextCorrige() {
  const el = document.getElementById('texte-corrige');
  if (el) el.classList.add('visible');
}

// ══════════════════════════════════════
// DRAG AND DROP — S3
// ══════════════════════════════════════
function initDnd() {
  const items = document.querySelectorAll('.dnd-item');
  const targets = document.querySelectorAll('.dnd-target');

  items.forEach(item => {
    item.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', item.id);
      item.classList.add('dragging');
    });
    item.addEventListener('dragend', () => item.classList.remove('dragging'));
  });

  targets.forEach(target => {
    target.addEventListener('dragover', e => {
      e.preventDefault();
      target.classList.add('drag-over');
    });
    target.addEventListener('dragleave', () => target.classList.remove('drag-over'));
    target.addEventListener('drop', e => {
      e.preventDefault();
      target.classList.remove('drag-over');
      const id = e.dataTransfer.getData('text/plain');
      const item = document.getElementById(id);
      if (item) target.appendChild(item);
    });
  });
}

function checkDnd() {
  const feedback = document.getElementById('dnd-feedback');
  const targets = document.querySelectorAll('.dnd-target');
  let correct = 0, total = 0;

  targets.forEach(target => {
    const expectedPara = target.dataset.target;
    const items = target.querySelectorAll('.dnd-item');
    items.forEach(item => {
      total++;
      if (item.dataset.para === expectedPara) {
        item.classList.add('dnd-correct');
        item.classList.remove('dnd-wrong');
        correct++;
      } else {
        item.classList.add('dnd-wrong');
        item.classList.remove('dnd-correct');
      }
    });
  });

  // Vérifier les phrases non classées
  const pool = document.getElementById('dnd-pool');
  if (pool) {
    const remaining = pool.querySelectorAll('.dnd-item');
    remaining.forEach(item => { total++; item.style.borderColor = '#F5A623'; });
  }

  if (feedback) {
    feedback.classList.add('visible');
    if (correct === 6) {
      feedback.textContent = `✅ Parfait ! Les 6 phrases sont bien classées. §1 (Le merle) : phrases 2, 4, 6, 1 — §2 (La pie) : phrases 3, 5`;
      feedback.style.background = 'var(--green-l)';
      feedback.style.borderColor = 'var(--green)';
      feedback.style.color = 'var(--green)';
    } else {
      feedback.textContent = `${correct}/${total === 0 ? 6 : total} phrases bien classées. Vérifiez les éléments en rouge.`;
      feedback.style.background = 'var(--red-l)';
      feedback.style.borderColor = 'var(--red)';
      feedback.style.color = 'var(--red)';
    }
  }
}

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
renderCalendar();
</script>
