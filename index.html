<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Français — P5 · Diaporama</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800;900&family=Caveat:wght@400;600;700&display=swap');

/* ══ VARIABLES ══════════════════════════════════════════════════════ */
:root {
  /* Palette Ma P'tite Règle — shell */
  --pink:        var(--slide-surf);
  --pink-dark:   var(--slide-bord);
  --pink-light:  var(--slide-bg);
  --red:         #F5A623;
  --red-light:   #FF5A3C;
  --bg:          var(--slide-bg);
  --white:       #FFFFFF;
  --ink:         #1A0A08;
  --ink2:        #5A2A1A;
  --ink3:        #A07060;
  --border:      var(--slide-bord);
  --shadow-sm:   0 2px 8px rgba(232,50,26,0.10);
  --shadow-md:   0 4px 20px rgba(232,50,26,0.13);

  /* Palette diapo — couleurs accent slides */
  --green:       #4CAF82;
  --green-l:     #1A3D2E;
  --blue:        #5B9CF6;
  --blue-l:      #1A2A4A;
  --purple:      #A97FF5;
  --purple-l:    #2A1A4A;
  --orange:      #F5A623;
  --orange-l:    #3A2A0A;
  --dred:        #F56B6B;
  --dred-l:      #3A1A1A;
  --teal:        #2DD4BF;
  --teal-l:      #0A2A28;
  --dpink:       #F472B6;
  --dpink-l:     #2A0A1A;

  /* Slides dark surface */
  --slide-bg:    #1C1C2E;
  --slide-surf:  #252540;
  --slide-card:  #2E2E4E;
  --slide-bord:  #3A3A5C;
  --slide-text:  #E8E8F0;
  --slide-muted: #8888AA;
  --chalk:       #F0EEE8;

  --radius:      12px;
  --radius-lg:   20px;
  --accent-color: var(--orange);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--slide-bg);
  color: var(--slide-text);
  min-height: 100vh;
  overflow: hidden;
}

/* ══ HEADER ══════════════════════════════════════════════════════════ */
header {
  background: var(--slide-surf);
  border-bottom: 3px solid var(--slide-bord);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 66px;
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 300;
  box-shadow: 0 3px 16px rgba(0,0,0,0.4);
}
.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-icon {
  font-size: 32px;
  line-height: 1;
}
.header-title {
  font-family: 'Baloo 2', cursive;
  font-weight: 800;
  font-size: 20px;
  color: var(--orange);
  line-height: 1.1;
  letter-spacing: -0.3px;
}
.header-title small {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--slide-muted);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.header-badge {
  background: var(--orange);
  color: #fff;
  font-family: 'Baloo 2', cursive;
  font-weight: 800;
  font-size: 13px;
  padding: 5px 16px;
  border-radius: 30px;
  letter-spacing: 0.3px;
  box-shadow: 0 3px 10px rgba(245,166,35,0.3);
}

/* ══ LAYOUT ══════════════════════════════════════════════════════════ */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  height: calc(100vh - 66px);
  margin-top: 66px;
}

/* ══ SIDEBAR ══════════════════════════════════════════════════════════ */
.sidebar {
  background: var(--slide-surf);
  border-right: 3px solid var(--slide-bord);
  overflow-y: auto;
  padding: 16px 12px 24px;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--slide-bord); border-radius: 4px; }
.sidebar::-webkit-scrollbar-track { background: transparent; }

.sidebar-title {
  font-family: 'Baloo 2', cursive;
  font-size: 11px;
  font-weight: 700;
  color: var(--slide-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 14px;
  padding-left: 4px;
}

.month-block { margin-bottom: 20px; }
.month-label {
  font-family: 'Baloo 2', cursive;
  font-size: 14px;
  font-weight: 800;
  color: var(--orange);
  margin-bottom: 8px;
  padding: 3px 10px;
  background: var(--slide-surf);
  border-radius: 10px;
  display: inline-block;
}

/* Bouton séance dans la sidebar */
.cal-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--slide-bg);
  border: 2px solid var(--slide-bord);
  border-radius: 12px;
  padding: 8px 10px;
  margin-bottom: 6px;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
}
.cal-btn::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--day-color, var(--orange));
  border-radius: 4px 0 0 4px;
}
.cal-btn:hover:not(.locked) {
  border-color: var(--day-color, var(--orange));
  background: var(--slide-surf);
  transform: translateX(3px);
  box-shadow: var(--shadow-sm);
}
.cal-btn.active {
  background: var(--slide-surf);
  border-color: var(--day-color, var(--orange));
  box-shadow: var(--shadow-sm);
}
.cal-btn.locked { opacity: 0.35; cursor: default; }
.cal-btn.locked:hover { transform: none; }

.cal-btn-date {
  font-family: 'Baloo 2', cursive;
  font-size: 22px;
  font-weight: 800;
  color: var(--day-color, var(--orange));
  line-height: 1;
  flex-shrink: 0;
  width: 32px;
  text-align: center;
}
.cal-btn-body { flex: 1; min-width: 0; }
.cal-btn-disc {
  font-size: 9px;
  font-weight: 800;
  color: var(--slide-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 1px;
}
.cal-btn-title {
  font-family: 'Baloo 2', cursive;
  font-size: 12px;
  font-weight: 800;
  color: var(--slide-text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.2;
}
.cal-btn-notion {
  font-size: 10px;
  color: var(--slide-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cal-btn-count {
  font-family: 'Baloo 2', cursive;
  font-size: 10px;
  font-weight: 800;
  background: var(--day-color, var(--orange));
  color: #fff;
  padding: 2px 7px;
  border-radius: 20px;
  flex-shrink: 0;
}
.cal-btn-lock { font-size: 14px; flex-shrink: 0; opacity: 0.5; }

/* ══ ZONE PRINCIPALE ══════════════════════════════════════════════════ */
.main {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--slide-bg);
}

/* ── Écran calendrier (accueil) ── */
#screen-cal {
  display: none;
  flex: 1;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px;
}
#screen-cal.active { display: flex; }

.welcome-card {
  background: var(--slide-surf);
  border: 3px solid var(--slide-bord);
  border-radius: 24px;
  padding: 40px 48px;
  text-align: center;
  max-width: 520px;
  box-shadow: var(--shadow-md);
}
.welcome-emoji { font-size: 56px; margin-bottom: 16px; }
.welcome-card h1 {
  font-family: 'Baloo 2', cursive;
  font-size: 28px;
  font-weight: 800;
  color: var(--orange);
  margin-bottom: 10px;
}
.welcome-card p {
  font-size: 15px;
  color: var(--slide-muted);
  line-height: 1.6;
  margin-bottom: 20px;
}
.welcome-legend {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}
.legend-chip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--slide-bg);
  border: 2px solid var(--slide-bord);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 700;
  color: var(--slide-muted);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
}

/* ── Écran slide ── */
#screen-slide {
  display: none;
  flex: 1;
  flex-direction: column;
  overflow: hidden;
}
#screen-slide.active { display: flex; }

/* Topbar slide */
.slide-topbar {
  display: flex;
  align-items: center;
  padding: 10px 20px;
  background: var(--slide-surf);
  border-bottom: 2px solid var(--slide-bord);
  gap: 14px;
  flex-shrink: 0;
  z-index: 10;
}
.btn-back {
  background: var(--slide-bg);
  border: 2px solid var(--slide-bord);
  color: var(--slide-muted);
  padding: 7px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Baloo 2', cursive;
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
}
.btn-back:hover { border-color: var(--orange); color: var(--orange); }

.slide-meta { flex: 1; }
.slide-meta-title {
  font-family: 'Baloo 2', cursive;
  font-size: 14px;
  font-weight: 800;
  color: var(--slide-text);
}
.slide-meta-sub {
  font-size: 11px;
  color: var(--slide-muted);
  margin-top: 1px;
}

.slide-progress { display: flex; align-items: center; gap: 6px; }
.progress-dots { display: flex; gap: 5px; }
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--slide-bord);
  transition: all 0.2s;
  cursor: pointer;
}
.dot.active {
  background: var(--accent-color, var(--orange));
  transform: scale(1.3);
}
.dot.done {
  background: var(--accent-color, var(--orange));
  opacity: 0.45;
}

.slide-nav { display: flex; gap: 6px; }
.btn-nav {
  background: var(--slide-bg);
  border: 2px solid var(--slide-bord);
  color: var(--slide-muted);
  width: 34px; height: 34px;
  border-radius: 10px;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.btn-nav:hover:not(:disabled) {
  background: var(--accent-color, var(--orange));
  color: #fff;
  border-color: transparent;
}
.btn-nav:disabled { opacity: 0.3; cursor: default; }

/* ── Bouton téléchargement fiches PDF ── */
.btn-pdf-dl {
  display: none;
  align-items: center;
  gap: 6px;
  background: var(--green-l);
  border: 1.5px solid var(--green);
  color: var(--green);
  padding: 6px 14px;
  border-radius: 10px;
  font-family: 'Baloo 2', cursive;
  font-size: 12px;
  font-weight: 800;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.15s;
  position: relative;
  user-select: none;
  outline: none;
}
.btn-pdf-dl:hover { background: var(--green); color: #fff; }
.btn-pdf-dl.visible { display: flex; }

.pdf-dropdown {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: var(--slide-surf);
  border: 1.5px solid var(--slide-bord);
  border-radius: 10px;
  padding: 6px;
  min-width: 260px;
  z-index: 200;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
}
.pdf-dropdown.open { display: block; }
.pdf-link {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 8px;
  color: var(--slide-text);
  text-decoration: none;
  font-family: 'Nunito', sans-serif;
  font-size: 12px;
  font-weight: 700;
  transition: background 0.1s;
}
.pdf-link:hover { background: var(--slide-card); }
.pdf-link .pdf-badge {
  font-size: 10px;
  font-weight: 800;
  padding: 2px 8px;
  border-radius: 20px;
  flex-shrink: 0;
}
.pdf-ce2 { background: var(--green-l); color: var(--green); }
.pdf-cm1 { background: var(--blue-l);  color: var(--blue); }
.pdf-cm2 { background: var(--purple-l);color: var(--purple); }

/* Zone slide — fond sombre pour les slides */
.slide-stage {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: var(--slide-bg);
}

.slide {
  display: none;
  position: absolute;
  inset: 0;
  padding: 28px 48px;
  overflow-y: auto;
  animation: slideIn 0.25s ease;
  color: var(--slide-text);
  font-family: 'Nunito', sans-serif;
}
.slide.active { display: block; }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(16px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ══ COMPOSANTS SLIDES (repris du diapo) ════════════════════════════ */
.slide-phase {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--phase-bg, var(--teal-l));
  border: 1px solid var(--phase-color, var(--teal));
  color: var(--phase-color, var(--teal));
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 14px;
}
.slide-h1 {
  font-family: 'Baloo 2', cursive;
  font-size: clamp(26px, 3.2vw, 40px);
  font-weight: 800;
  color: #fff;
  letter-spacing: -0.5px;
  line-height: 1.15;
  margin-bottom: 6px;
}
.slide-h1 span { color: var(--accent-color, var(--orange)); }
.slide-sub {
  font-size: 14px;
  color: var(--slide-muted);
  margin-bottom: 20px;
  font-style: italic;
}
.consigne-box {
  background: var(--slide-card);
  border-left: 4px solid var(--accent-color, var(--orange));
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 14px 20px;
  font-size: 19px;
  font-weight: 700;
  color: var(--slide-text);
  margin-bottom: 18px;
  line-height: 1.5;
}
.rule-box {
  background: linear-gradient(135deg, var(--teal-l), #0a1a18);
  border: 2px solid var(--teal);
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 18px;
}
.rule-box .rule-title {
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--teal);
  margin-bottom: 8px;
}
.rule-box p { font-size: 19px; color: var(--slide-text); line-height: 1.6; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.card {
  background: var(--slide-card);
  border: 1px solid var(--slide-bord);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.card-title {
  font-family: 'Baloo 2', cursive;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 8px;
}
.phrase-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--slide-surf);
  border: 1px solid var(--slide-bord);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-bottom: 8px;
}
.phrase-text {
  flex: 1;
  font-family: 'Caveat', cursive;
  font-size: 48px;
  color: var(--slide-text);
}
.phrase-badge {
  width: 36px; height: 36px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 900;
  flex-shrink: 0;
  cursor: pointer;
  border: 2px solid var(--slide-bord);
  color: var(--slide-muted);
  background: transparent;
  font-family: 'Nunito', sans-serif;
  transition: all 0.2s;
}
.phrase-badge:hover { transform: scale(1.1); }
.phrase-badge.ok { background: var(--green); border-color: var(--green); color: white; }
.phrase-badge.ko { background: var(--dred); border-color: var(--dred); color: white; }
.phrase-reason {
  font-size: 13px;
  color: var(--slide-muted);
  display: none;
  margin-top: 4px;
  padding: 6px 10px;
  background: var(--slide-surf);
  border-radius: 8px;
  font-style: italic;
}
.phrase-reason.visible { display: block; }
.timer-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--teal-l);
  border: 1px solid var(--teal);
  color: var(--teal);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 800;
  margin-bottom: 16px;
}
.trace-box {
  background: linear-gradient(135deg, #1a1a2e, #0a1a28);
  border: 2px solid var(--teal);
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-top: 14px;
}
.trace-title {
  font-family: 'Baloo 2', cursive;
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--teal);
  margin-bottom: 8px;
}
.trace-text {
  font-family: 'Caveat', cursive;
  font-size: 44px;
  color: var(--chalk);
  line-height: 1.6;
}
.btn-reveal {
  background: var(--slide-card);
  border: 2px solid var(--accent-color, var(--orange));
  color: var(--accent-color, var(--orange));
  padding: 10px 22px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: 'Baloo 2', cursive;
  font-size: 14px;
  font-weight: 800;
  transition: all 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.btn-reveal:hover { background: var(--accent-color, var(--orange)); color: white; }
.correction-reveal {
  margin-top: 10px;
  padding: 12px 16px;
  background: var(--green-l);
  border: 1px solid var(--green);
  border-radius: var(--radius);
  font-size: 14px;
  color: var(--green);
  display: none;
}
.correction-reveal.visible { display: block; animation: fadeIn 0.3s; }
.niveau-tags { display: flex; gap: 8px; margin-bottom: 14px; }
.niveau-ce2  { background: var(--green-l); color: var(--green); border: 1px solid var(--green); padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 800; }
.niveau-cm1  { background: var(--blue-l);  color: var(--blue);  border: 1px solid var(--blue);  padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 800; }
.niveau-cm2  { background: var(--purple-l);color: var(--purple);border: 1px solid var(--purple);padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 800; }
.versions-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 14px; }
.version-card { border-radius: var(--radius); padding: 14px 16px; border: 2px solid var(--slide-bord); background: var(--slide-card); }
.version-label { font-family: 'Baloo 2', cursive; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; color: var(--slide-muted); }
.version-text { font-family: 'Caveat', cursive; font-size: 42px; color: var(--slide-text); line-height: 1.4; }
.version-verdict { font-size: 17px; font-style: italic; margin-top: 8px; opacity: 0; transition: opacity 0.4s; }
.version-verdict.visible { opacity: 1; }
.big-text-block {
  background: #0d0d1a;
  border: 2px solid var(--slide-bord);
  border-radius: var(--radius);
  padding: 18px 22px;
  font-family: 'Caveat', cursive;
  font-size: 52px;
  color: var(--chalk);
  line-height: 1.6;
  margin-bottom: 16px;
  text-align: center;
}
.reg-table { width: 100%; border-collapse: collapse; margin-bottom: 14px; }
.reg-table th { padding: 10px 14px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 800; text-align: center; }
.reg-table td { padding: 10px 14px; border-bottom: 1px solid var(--slide-bord); font-family: 'Caveat', cursive; font-size: 40px; text-align: center; }
.reg-table tr:last-child td { border-bottom: none; }
.morpho-word { display: inline-flex; align-items: stretch; font-family: 'Caveat', cursive; font-size: 46px; margin: 5px; }
.morpho-prefix  { background: var(--orange-l); border: 2px solid var(--orange); color: var(--orange); padding: 4px 10px; border-radius: 8px 0 0 8px; }
.morpho-radical { background: var(--teal-l); border-top: 2px solid var(--teal); border-bottom: 2px solid var(--teal); color: var(--teal); padding: 4px 10px; }
.morpho-suffix  { background: var(--purple-l); border: 2px solid var(--purple); color: var(--purple); padding: 4px 10px; border-radius: 0 8px 8px 0; }

r:#A97FF5">-tion</span> observation<br><span style="color:#A97FF5">-able</span> lavable<br><span style="color:#A97FF5">-ment</span> doucement</p></div></div><div class="trace-box" style="border-color:#F5A623"><div class="trace-title" style="color:#F5A623">📝 À retenir</div><div class="trace-text">Un <strong>préfixe</strong> avant le radical modifie le sens. Un <strong>suffixe</strong> après change la classe grammaticale : <em>observer (verbe) → observation (nom) → observable (adjectif).</em></div></div>` },

yle="background:#2A1A4A;color:#A97FF5">un ouvrage</td></tr></tbody></table><div class="trace-box" style="border-color:#5B9CF6"><div class="trace-title" style="color:#5B9CF6">📝 À retenir</div><div class="trace-text">Le <strong>registre familier</strong> s'utilise entre amis. Le <strong>registre courant</strong> convient en classe et à l'écrit du quotidien. Le <strong>registre soutenu</strong> s'emploie dans les textes littéraires et situations formelles.</div></div>` },

let currentSeance = null;
let currentSlide = 0;

// ── Bouton fiches PDF ──────────────────────────────────────────────
function togglePdfMenu(e) {
  e.stopPropagation();
  const dd = document.getElementById('pdf-dropdown');
  dd.classList.toggle('open');
}
document.addEventListener('click', () => {
  const dd = document.getElementById('pdf-dropdown');
  if (dd) dd.classList.remove('open');
});

// CALENDRIER
// ══════════════════════════════════════
function renderCalendar() {
  const MONTH_ORDER = { 'Avril':4, 'Mai':5, 'Juin':6, 'Juillet':7 };
  const sorted = [...SEANCES].sort((a, b) => {
    const ma = MONTH_ORDER[a.month] || 0, mb = MONTH_ORDER[b.month] || 0;
    if (ma !== mb) return ma - mb;
    return parseInt(a.date) - parseInt(b.date);
  });

  // Grouper par mois
  const byMonth = {};
  sorted.forEach(s => {
    if (!byMonth[s.month]) byMonth[s.month] = [];
    byMonth[s.month].push(s);
  });

  const sidebar = document.getElementById('cal-sidebar-content');
  sidebar.innerHTML = '';

  Object.entries(byMonth).forEach(([month, seances]) => {
    const block = document.createElement('div');
    block.className = 'month-block';
    block.innerHTML = `<div class="month-label">${month} 2026</div>`;

    seances.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'cal-btn' + (s.locked ? ' locked' : '');
      btn.style.setProperty('--day-color', s.color);
      const discipline = s.id.startsWith('v') ? '📚 Voc' : s.id.startsWith('edl') ? '📐 EDL' : '✏️ PE';
      btn.innerHTML = `
        <div class="cal-btn-date">${s.date}</div>
        <div class="cal-btn-body">
          <div class="cal-btn-disc">${discipline}</div>
          <div class="cal-btn-title">${s.seance}</div>
          <div class="cal-btn-notion">${s.notion}</div>
        </div>
        ${s.locked ? '<div class="cal-btn-lock">🔒</div>' : `<div class="cal-btn-count">${s.slides.length}</div>`}
      `;
      if (!s.locked) btn.addEventListener('click', () => openSeance(s.id));
      block.appendChild(btn);
    });

    sidebar.appendChild(block);
  });
}

// ══════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════
function openSeance(id) {
  currentSeance = SEANCES.find(s => s.id === id);
  currentSlide = 0;
  // Marquer le bouton actif dans la sidebar
  document.querySelectorAll('.cal-btn').forEach(b => b.classList.remove('active'));
  const btns = document.querySelectorAll('.cal-btn');
  btns.forEach(b => { if (b.querySelector('.cal-btn-title') && b.querySelector('.cal-btn-title').textContent === currentSeance.seance) b.classList.add('active'); });
  document.getElementById('screen-cal').classList.remove('active');
  document.getElementById('screen-slide').classList.add('active');
  document.documentElement.style.setProperty('--accent-color', currentSeance.color);

  // Bouton fiches PDF — visible uniquement pour les séances vocabulaire
  const btnPdf = document.getElementById('btn-pdf-dl');
  if (currentSeance.pdfs) {
    const names = currentSeance.pdfs.map(u => u.split('/').pop());
    document.getElementById('pdf-ce2').href = currentSeance.pdfs[0];
    document.getElementById('pdf-ce2-name').textContent = names[0];
    document.getElementById('pdf-cm1').href = currentSeance.pdfs[1];
    document.getElementById('pdf-cm1-name').textContent = names[1];
    document.getElementById('pdf-cm2').href = currentSeance.pdfs[2];
    document.getElementById('pdf-cm2-name').textContent = names[2];
    btnPdf.classList.add('visible');
  } else {
    btnPdf.classList.remove('visible');
  }

  renderSlides();
  updateNav();
}

function goBack() {
  document.getElementById('screen-slide').classList.remove('active');
  document.getElementById('screen-cal').classList.add('active');
  document.getElementById('btn-pdf-dl').classList.remove('visible');
  currentSeance = null;
}

function nextSlide() {
  if (currentSlide < currentSeance.slides.length - 1) {
    currentSlide++;
    renderSlides();
    updateNav();
  }
}

function prevSlide() {
  if (currentSlide > 0) {
    currentSlide--;
    renderSlides();
    updateNav();
  }
}

function goToSlide(i) {
  currentSlide = i;
  renderSlides();
  updateNav();
}

function renderSlides() {
  const stage = document.getElementById('slide-stage');
  stage.innerHTML = '';
  const s = currentSeance.slides[currentSlide];
  const div = document.createElement('div');
  div.className = 'slide active';
  div.innerHTML = s.html;
  stage.appendChild(div);

  document.getElementById('slide-title-bar').textContent = currentSeance.seance;
  document.getElementById('slide-sub-bar').textContent =
    `Slide ${currentSlide + 1} / ${currentSeance.slides.length}`;

  // Dots
  const dots = document.getElementById('progress-dots');
  dots.innerHTML = '';
  currentSeance.slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === currentSlide ? ' active' : i < currentSlide ? ' done' : '');
    d.onclick = () => goToSlide(i);
    dots.appendChild(d);
  });

  // Réinitialiser DnD si présent
  if (stage.querySelector('#dnd-pool')) initDnd();
}

function updateNav() {
  document.getElementById('btn-prev').disabled = currentSlide === 0;
  document.getElementById('btn-next').disabled = currentSlide === currentSeance.slides.length - 1;
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (!currentSeance) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') nextSlide();
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   prevSlide();
  if (e.key === 'Escape') goBack();
});

// ══════════════════════════════════════
// INTERACTIONS SLIDES
// ══════════════════════════════════════
function toggleBadge(btn, result, reasonId) {
  // Révéler/cacher la raison
  const reason = document.getElementById(reasonId);
  if (reason) reason.classList.toggle('visible');
  // Colorer le badge seulement quand on clique (la réponse se révèle)
  if (btn.dataset.result === 'ok') {
    btn.classList.toggle('ok');
    btn.textContent = btn.classList.contains('ok') ? '✓' : '?';
  } else if (btn.dataset.result === 'ko') {
    btn.classList.toggle('ko');
    btn.textContent = btn.classList.contains('ko') ? '✗' : '?';
  }
}

function revealReason(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('visible');
}

function revealVersions() {
  ['v1-verdict','v2-verdict'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('visible');
  });
}

function revealIntroVerdicts() {
  ['ia-v','ib-v'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.add('visible');
  });
}

function showParagraphes() {
  const el = document.getElementById('para-result');
  if (el) { el.style.display = 'block'; el.style.animation = 'fadeIn 0.4s'; }
}

function showSubstituts() {
  const el = document.getElementById('sub-result');
  if (el) { el.style.display = 'block'; }
}

function showIntroConclusion() {
  const el = document.getElementById('intro-result');
  if (el) { el.style.display = 'block'; }
}

function showTextCorrige() {
  const el = document.getElementById('texte-corrige');
  if (el) el.classList.add('visible');
}

// ══════════════════════════════════════
// DRAG AND DROP — S3
// ══════════════════════════════════════
function initDnd() {
  const items = document.querySelectorAll('.dnd-item');
  const targets = document.querySelectorAll('.dnd-target');

  items.forEach(item => {
    item.addEventListener('dragstart', e => {
      e.dataTransfer.setData('text/plain', item.id);
      item.classList.add('dragging');
    });
    item.addEventListener('dragend', () => item.classList.remove('dragging'));
  });

  targets.forEach(target => {
    target.addEventListener('dragover', e => {
      e.preventDefault();
      target.classList.add('drag-over');
    });
    target.addEventListener('dragleave', () => target.classList.remove('drag-over'));
    target.addEventListener('drop', e => {
      e.preventDefault();
      target.classList.remove('drag-over');
      const id = e.dataTransfer.getData('text/plain');
      const item = document.getElementById(id);
      if (item) target.appendChild(item);
    });
  });
}

function checkDnd() {
  const feedback = document.getElementById('dnd-feedback');
  const targets = document.querySelectorAll('.dnd-target');
  let correct = 0, total = 0;

  targets.forEach(target => {
    const expectedPara = target.dataset.target;
    const items = target.querySelectorAll('.dnd-item');
    items.forEach(item => {
      total++;
      if (item.dataset.para === expectedPara) {
        item.classList.add('dnd-correct');
        item.classList.remove('dnd-wrong');
        correct++;
      } else {
        item.classList.add('dnd-wrong');
        item.classList.remove('dnd-correct');
      }
    });
  });

  // Vérifier les phrases non classées
  const pool = document.getElementById('dnd-pool');
  if (pool) {
    const remaining = pool.querySelectorAll('.dnd-item');
    remaining.forEach(item => { total++; item.style.borderColor = '#F5A623'; });
  }

  if (feedback) {
    feedback.classList.add('visible');
    if (correct === 6) {
      feedback.textContent = `✅ Parfait ! Les 6 phrases sont bien classées. §1 (Le merle) : phrases 2, 4, 6, 1 — §2 (La pie) : phrases 3, 5`;
      feedback.style.background = 'var(--green-l)';
      feedback.style.borderColor = 'var(--green)';
      feedback.style.color = 'var(--green)';
    } else {
      feedback.textContent = `${correct}/${total === 0 ? 6 : total} phrases bien classées. Vérifiez les éléments en rouge.`;
      feedback.style.background = 'var(--red-l)';
      feedback.style.borderColor = 'var(--red)';
      feedback.style.color = 'var(--red)';
    }
  }
}
